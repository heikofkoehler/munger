<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Munger — Portfolio</title>
  <!-- Plotly.js pinned 2.32.0 via jsDelivr — no tracking, no cookies -->
  <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min@2.32.0/plotly.min.js"></script>
  <style>
    /* ── Variables ──────────────────────────────────────────── */
    :root {
      --bg-page:     #0f1117;
      --bg-card:     #1a1d27;
      --bg-card-2:   #22263a;
      --border:      #2e3347;
      --text-primary:   #f0f2f5;
      --text-secondary: #8891a8;
      --text-muted:     #4d5568;
      --accent-purple:  #6c63ff;
      --accent-teal:    #00d4aa;
      --accent-blue:    #3b82f6;
      --accent-amber:   #f5a623;
      --accent-red:     #e05c5c;
      --color-stock:    #6c63ff;
      --color-etf:      #00d4aa;
      --color-fi:       #3b82f6;
      --color-cash:     #8891a8;
      --color-mf:       #f5a623;
    }

    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-primary);
    }
    .brand span { color: var(--accent-purple); }
    #refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #refresh-btn:hover { border-color: var(--accent-purple); color: var(--text-primary); }
    #refresh-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .layout {
      display: flex;
      min-height: calc(100vh - 56px);
    }
    .sidebar {
      width: 168px;
      flex-shrink: 0;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
      padding: 1.25rem 0;
    }
    .tab-btn {
      display: flex;
      align-items: center;
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      border-left: 3px solid transparent;
      color: var(--text-secondary);
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); }
    .tab-btn.active {
      color: var(--accent-purple);
      border-left-color: var(--accent-purple);
      background: rgba(108,99,255,0.08);
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .content { flex: 1; min-width: 0; }
    .page { padding: 2rem 2.5rem 4rem; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
    }

    /* ── Hero ───────────────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 3rem 1rem 2.5rem;
    }
    .hero-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    .hero-value {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1;
    }
    .hero-date {
      margin-top: 0.75rem;
      font-size: 13px;
      color: var(--text-muted);
    }
    .hero-sub {
      margin-top: 0.5rem;
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* ── 2-column grid ──────────────────────────────────────── */
    .grid-2 {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .grid-2 .card { margin-bottom: 0; }

    /* ── 3-column grid ──────────────────────────────────────── */
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .grid-3 .card { margin-bottom: 0; }

    /* ── Sunburst ───────────────────────────────────────────── */
    #sunburst-chart { height: 380px; }

    /* ── Concentration flags ────────────────────────────────── */
    .flags-empty {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 0.5rem;
    }
    .flag-card {
      background: var(--bg-card-2);
      border: 1px solid var(--accent-red);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
    }
    .flag-ticker {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-red);
      margin-bottom: 0.25rem;
    }
    .flag-weight {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .flag-of { font-size: 13px; color: var(--text-secondary); margin-left: 4px; }
    .flag-threshold {
      margin-top: 0.4rem;
      font-size: 12px;
      color: var(--text-muted);
    }
    .flag-over { color: var(--accent-amber); font-weight: 600; }
    .no-flags {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent-teal);
      font-size: 13px;
      margin-top: 0.25rem;
    }

    /* ── Allocation legend (below sunburst) ─────────────────── */
    .alloc-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      margin-top: 1rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-pct { color: var(--text-primary); font-weight: 600; }

    /* ── Institutions ───────────────────────────────────────── */
    .inst-row {
      display: grid;
      grid-template-columns: 180px 1fr 110px 52px;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }
    .inst-row:last-child { border-bottom: none; }
    .inst-name { font-size: 13px; color: var(--text-primary); }
    .inst-bar-wrap {
      background: var(--bg-card-2);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .inst-bar {
      height: 100%;
      border-radius: 4px;
      background: var(--accent-purple);
      transition: width 0.4s ease;
    }
    .inst-value {
      font-size: 13px;
      color: var(--text-primary);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .inst-pct {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: right;
    }

    /* ── Tables ─────────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 0.75rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    thead th:not(:first-child) { text-align: right; }
    thead th:first-child { padding-left: 0; }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-card-2); }
    tbody td {
      padding: 0.7rem 0.75rem;
      color: var(--text-primary);
      vertical-align: middle;
    }
    tbody td:not(:first-child) { text-align: right; }
    tbody td:first-child { padding-left: 0; }
    .td-ticker {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
    }
    .td-name { color: var(--text-secondary); }
    .td-value { font-variant-numeric: tabular-nums; }
    .td-weight { color: var(--text-secondary); }
    .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .flag-icon {
      display: inline-block;
      color: var(--accent-amber);
      font-size: 12px;
      margin-left: 4px;
    }
    .td-muted { color: var(--text-muted); }
    .td-num { font-variant-numeric: tabular-nums; }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      gap: 1rem;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tax bucket cards ────────────────────────────────────── */
    .bucket-hero-card {
      text-align: center;
      padding: 1.5rem 1rem;
    }
    .bucket-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.4rem;
    }
    .bucket-value {
      font-size: 30px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.1;
    }
    .bucket-pct {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .tax-bucket-card { margin-bottom: 1.5rem; }
    .tax-account-row {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .tax-account-row:last-child { border-bottom: none; }
    .tax-account-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.4rem;
    }
    .tax-account-name { font-size: 13px; color: var(--text-primary); font-weight: 500; }
    .tax-account-inst { font-size: 12px; color: var(--text-muted); }
    .tax-account-val { font-size: 13px; color: var(--text-primary); font-variant-numeric: tabular-nums; }
    .tax-bar-wrap {
      background: var(--bg-card-2);
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
    }
    .tax-bar {
      height: 100%;
      border-radius: 4px;
      background: var(--accent-blue);
      transition: width 0.4s ease;
    }
    .tax-note {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    /* ── Loading state ──────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg-page);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--text-secondary);
      z-index: 100;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>

<div id="loading">Loading portfolio…</div>

<header>
  <div class="brand"><span>M</span>UNGER</div>
  <button id="refresh-btn" onclick="refreshData()">Refresh Data</button>
</header>

<div class="layout">
<nav class="sidebar">
  <button class="tab-btn active" onclick="switchTab('portfolio')">Portfolio</button>
  <button class="tab-btn" onclick="switchTab('dividends')">Dividends</button>
  <button class="tab-btn" onclick="switchTab('earnings')">Earnings</button>
  <button class="tab-btn" onclick="switchTab('tax')">Tax</button>
</nav>

<div class="content">
<div class="page">

  <!-- ── Portfolio tab ── -->
  <div id="panel-portfolio" class="tab-panel active">
    <div class="hero">
      <div class="hero-label">Net Worth</div>
      <div id="total-value" class="hero-value">—</div>
      <div id="price-date" class="hero-date">—</div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">Allocation</div>
        <div id="sunburst-chart"></div>
        <div id="alloc-legend" class="alloc-legend"></div>
      </div>
      <div class="card">
        <div class="card-title">Concentration Risk</div>
        <div id="flags-panel"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">By Institution</div>
      <div id="institutions-panel"></div>
    </div>

    <div class="card">
      <div class="card-title">Positions</div>
      <table>
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Name</th>
            <th>Value</th>
            <th>Weight</th>
            <th>Type</th>
          </tr>
        </thead>
        <tbody id="positions-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ── Dividends tab ── -->
  <div id="panel-dividends" class="tab-panel">
    <div id="div-content"></div>
  </div>

  <!-- ── Earnings tab ── -->
  <div id="panel-earnings" class="tab-panel">
    <div id="earn-content"></div>
  </div>

  <!-- ── Tax tab ── -->
  <div id="panel-tax" class="tab-panel">
    <div id="tax-content"></div>
  </div>

</div>
</div><!-- .content -->
</div><!-- .layout -->

<script>
  // ── Constants ─────────────────────────────────────────────────
  const ASSET_COLORS = {
    'Stock':        '#6c63ff',
    'ETF':          '#00d4aa',
    'Fixed Income': '#3b82f6',
    'Cash':         '#8891a8',
    'Mutual Fund':  '#f5a623',
  };

  function colorFor(type) {
    return ASSET_COLORS[type] || '#4d5568';
  }

  // ── Formatters ────────────────────────────────────────────────
  function fmtDollar(v) {
    if (v >= 1_000_000) return '$' + (v / 1_000_000).toFixed(2) + 'M';
    if (v >= 1_000)     return '$' + (v / 1_000).toFixed(1) + 'K';
    return '$' + v.toFixed(2);
  }
  function fmtDollarFull(v) {
    return '$' + v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }
  function fmtPct(v) { return v.toFixed(2) + '%'; }
  function fmtMktCap(v) {
    if (!v) return '—';
    if (v >= 1e12) return '$' + (v / 1e12).toFixed(2) + 'T';
    if (v >= 1e9)  return '$' + (v / 1e9).toFixed(1) + 'B';
    if (v >= 1e6)  return '$' + (v / 1e6).toFixed(0) + 'M';
    return '$' + v.toLocaleString();
  }
  function fmtNum(v, decimals = 2) {
    if (v == null) return '—';
    return Number(v).toFixed(decimals);
  }

  // ── JS state ──────────────────────────────────────────────────
  let _summaryData = null;
  let _marketData = null;
  let _taxData = null;
  let _activeTab = 'portfolio';

  // ── Tab switching ─────────────────────────────────────────────
  function switchTab(name) {
    _activeTab = name;
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('onclick') === `switchTab('${name}')`);
    });
    document.querySelectorAll('.tab-panel').forEach(panel => {
      panel.classList.toggle('active', panel.id === `panel-${name}`);
    });

    if (name === 'dividends' || name === 'earnings') {
      loadMarket(name);
    } else if (name === 'tax') {
      loadTax();
    }
  }

  function spinner(msg = 'Fetching market data… (~16s first visit)') {
    return `<div class="spinner-wrap"><div class="spinner"></div><div>${msg}</div></div>`;
  }

  // ── Market data lazy load ─────────────────────────────────────
  async function loadMarket(tab) {
    if (_marketData) {
      if (tab === 'dividends') renderDividends(_marketData);
      else renderEarnings(_marketData);
      return;
    }
    const el = tab === 'dividends'
      ? document.getElementById('div-content')
      : document.getElementById('earn-content');
    el.innerHTML = spinner();
    try {
      _marketData = await fetch('/api/market').then(r => r.json());
      renderDividends(_marketData);
      renderEarnings(_marketData);
    } catch (err) {
      el.innerHTML = `<div class="spinner-wrap" style="color:var(--accent-red)">Failed to load market data: ${err.message}</div>`;
    }
  }

  // ── Tax data lazy load ────────────────────────────────────────
  async function loadTax() {
    if (_taxData) { renderTax(_taxData); return; }
    document.getElementById('tax-content').innerHTML = spinner('Computing tax buckets…');
    try {
      _taxData = await fetch('/api/tax').then(r => r.json());
      renderTax(_taxData);
    } catch (err) {
      document.getElementById('tax-content').innerHTML =
        `<div class="spinner-wrap" style="color:var(--accent-red)">Failed to load tax data: ${err.message}</div>`;
    }
  }

  // ── Portfolio renderers ───────────────────────────────────────
  function renderHero(data) {
    document.getElementById('total-value').textContent = fmtDollarFull(data.total_value);
    const date = data._price_date
      ? new Date(data._price_date).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})
      : 'Latest data';
    document.getElementById('price-date').textContent = 'as of ' + date;
  }

  function renderSunburst(data) {
    const labels  = ['Portfolio'];
    const parents = [''];
    const values  = [data.total_value];
    const colors  = ['rgba(0,0,0,0)'];
    const texts   = [''];

    for (const [ac, pct] of Object.entries(data.allocation)) {
      labels.push(ac);
      parents.push('Portfolio');
      values.push(pct / 100 * data.total_value);
      colors.push(colorFor(ac));
      texts.push(ac + '<br>' + fmtPct(pct));
    }

    for (const pos of data.positions) {
      if (pos.value < 1) continue;
      const label = pos.ticker || pos.security_name.slice(0, 12);
      labels.push(label);
      parents.push(pos.type_display);
      values.push(pos.value);
      colors.push(colorFor(pos.type_display) + 'bb');
      texts.push('');
    }

    Plotly.react('sunburst-chart', [{
      type: 'sunburst',
      labels, parents, values, text: texts,
      marker: { colors, line: { width: 1.5, color: '#0f1117' } },
      branchvalues: 'total',
      hovertemplate: '<b>%{label}</b><br>%{value:$,.0f}<br>%{percentRoot:.1%} of portfolio<extra></extra>',
      textinfo: 'label',
      insidetextorientation: 'radial',
      textfont: { family: '-apple-system, sans-serif', size: 11, color: '#f0f2f5' },
      leaf: { opacity: 0.85 },
    }], {
      paper_bgcolor: '#1a1d27',
      plot_bgcolor:  '#1a1d27',
      margin: { t: 0, b: 0, l: 0, r: 0 },
      showlegend: false,
    }, {
      responsive: true,
      displayModeBar: false,
    });

    const legend = document.getElementById('alloc-legend');
    legend.innerHTML = Object.entries(data.allocation)
      .sort((a, b) => b[1] - a[1])
      .map(([ac, pct]) => `
        <div class="legend-item">
          <div class="legend-dot" style="background:${colorFor(ac)}"></div>
          ${ac} <span class="legend-pct">${fmtPct(pct)}</span>
        </div>`).join('');
  }

  function renderFlags(data) {
    const panel = document.getElementById('flags-panel');
    const flagged = data.concentration.filter(c => c.flagged);

    if (!flagged.length) {
      panel.innerHTML = `<div class="no-flags">&#10003; No concentration flags triggered</div>`;
      return;
    }

    panel.innerHTML = flagged.map(f => `
      <div class="flag-card">
        <div class="flag-ticker">${f.ticker}</div>
        <div>
          <span class="flag-weight">${fmtPct(f.weight_pct)}</span>
          <span class="flag-of">of portfolio</span>
        </div>
        <div class="flag-threshold">
          Threshold ${fmtPct(f.threshold)}
          &nbsp;·&nbsp;
          <span class="flag-over">+${fmtPct(f.weight_pct - f.threshold)} over limit</span>
        </div>
      </div>`).join('');
  }

  function renderInstitutions(data) {
    const panel = document.getElementById('institutions-panel');
    panel.innerHTML = data.institutions.map(inst => `
      <div class="inst-row">
        <div class="inst-name">${inst.institution_name}</div>
        <div class="inst-bar-wrap">
          <div class="inst-bar" style="width:${inst.weight_pct}%"></div>
        </div>
        <div class="inst-value">${fmtDollar(inst.value)}</div>
        <div class="inst-pct">${fmtPct(inst.weight_pct)}</div>
      </div>`).join('');
  }

  function renderPositions(data) {
    const flaggedTickers = new Set(
      data.concentration.filter(c => c.flagged).map(c => c.ticker)
    );

    const tbody = document.getElementById('positions-body');
    tbody.innerHTML = data.positions
      .filter(p => p.value >= 1)
      .map(p => {
        const label = p.ticker || p.security_name.slice(0, 15);
        const flag  = flaggedTickers.has(p.ticker)
          ? '<span class="flag-icon" title="Concentration flag">&#9888;</span>' : '';
        const color = colorFor(p.type_display);
        return `
          <tr>
            <td class="td-ticker">${label}${flag}</td>
            <td class="td-name">${p.security_name}</td>
            <td class="td-value">${fmtDollar(p.value)}</td>
            <td class="td-weight">${fmtPct(p.weight_pct)}</td>
            <td>
              <span class="type-badge" style="background:${color}22;color:${color}">
                ${p.type_display}
              </span>
            </td>
          </tr>`;
      }).join('');
  }

  function renderDashboard(data) {
    renderHero(data);
    renderSunburst(data);
    renderFlags(data);
    renderInstitutions(data);
    renderPositions(data);
  }

  // ── Dividends renderer ────────────────────────────────────────
  function renderDividends(positions) {
    // Projected annual income = quantity * dividend_rate (per share)
    let totalIncome = 0;
    let totalValue = 0;
    for (const p of positions) {
      totalValue += p.value || 0;
      if (p.dividend_rate && p.quantity) {
        totalIncome += p.quantity * p.dividend_rate;
      } else if (p.dividend_yield && p.value) {
        totalIncome += p.value * p.dividend_yield / 100;
      }
    }
    const yieldOnValue = totalValue > 0 ? (totalIncome / totalValue * 100) : 0;

    const rows = positions
      .filter(p => p.value >= 1)
      .map(p => {
        let income = null;
        if (p.dividend_rate && p.quantity) {
          income = p.quantity * p.dividend_rate;
        } else if (p.dividend_yield && p.value) {
          // ETFs often have yield but no per-share rate — derive from position value
          income = p.value * p.dividend_yield / 100;
        }
        const divYield = p.dividend_yield != null ? p.dividend_yield : null;
        return { ...p, _income: income, _yield: divYield };
      })
      .sort((a, b) => (b._income || 0) - (a._income || 0));

    const tableRows = rows.map(p => {
      const ticker = p.ticker || p.security_name.slice(0, 15);
      const annualRate = p.dividend_rate != null ? '$' + fmtNum(p.dividend_rate) : '—';
      const yld = p._yield != null ? fmtNum(p._yield) + '%' : '—';
      const inc = p._income != null ? fmtDollar(p._income) : '—';
      const wt = fmtPct(p.weight_pct);
      return `<tr>
        <td class="td-ticker">${ticker}</td>
        <td class="td-name">${p.security_name}</td>
        <td class="td-value">${fmtDollar(p.value)}</td>
        <td class="td-num">${annualRate}</td>
        <td class="td-num">${yld}</td>
        <td class="td-num" style="color:var(--accent-teal)">${inc}</td>
        <td class="td-weight">${wt}</td>
      </tr>`;
    }).join('');

    document.getElementById('div-content').innerHTML = `
      <div class="hero">
        <div class="hero-label">Projected Annual Income</div>
        <div class="hero-value" style="color:var(--accent-teal)">${fmtDollar(totalIncome)}</div>
        <div class="hero-sub">Yield on value: ${fmtNum(yieldOnValue)}% &nbsp;·&nbsp; Total holdings: ${fmtDollarFull(totalValue)}</div>
      </div>
      <div class="card">
        <div class="card-title">Dividend Details</div>
        <table>
          <thead><tr>
            <th>Ticker</th>
            <th>Name</th>
            <th>Value</th>
            <th>Annual $/Share</th>
            <th>Yield</th>
            <th>Projected Income</th>
            <th>Weight</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
          <tfoot><tr style="border-top:1px solid var(--border)">
            <td colspan="5" style="padding:0.7rem 0;color:var(--text-muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em">Total</td>
            <td style="padding:0.7rem 0.75rem;text-align:right;color:var(--accent-teal);font-weight:700;font-variant-numeric:tabular-nums">${fmtDollar(totalIncome)}</td>
            <td></td>
          </tr></tfoot>
        </table>
      </div>`;
  }

  // ── Earnings renderer ─────────────────────────────────────────
  function renderEarnings(positions) {
    // Projected income (reuse same logic as dividends)
    let totalIncome = 0;
    for (const p of positions) {
      if (p.dividend_rate && p.quantity) totalIncome += p.quantity * p.dividend_rate;
      else if (p.dividend_yield && p.value) totalIncome += p.value * p.dividend_yield / 100;
    }

    // Weighted-avg trailing P/E (by value, only trailing_pe > 0, Stock/ETF only)
    let weightedPE = 0, totalWeight = 0;
    for (const p of positions) {
      if ((p.type_display === 'Stock' || p.type_display === 'ETF')
          && p.trailing_pe && p.trailing_pe > 0) {
        weightedPE += p.trailing_pe * p.value;
        totalWeight += p.value;
      }
    }
    const avgPE = totalWeight > 0 ? (weightedPE / totalWeight) : null;

    const rows = positions
      .filter(p => p.value >= 1)
      .sort((a, b) => b.value - a.value);

    const isCashOrFI = p => p.type_display === 'Cash' || p.type_display === 'Fixed Income';

    const tableRows = rows.map(p => {
      const ticker = p.ticker || p.security_name.slice(0, 15);
      if (isCashOrFI(p)) {
        return `<tr>
          <td class="td-ticker">${ticker}</td>
          <td class="td-name">${p.security_name}</td>
          <td class="td-value">${fmtDollar(p.value)}</td>
          <td class="td-muted">—</td>
          <td class="td-muted">—</td>
          <td class="td-muted">—</td>
          <td class="td-muted">—</td>
          <td class="td-muted">—</td>
        </tr>`;
      }
      const sector = p.sector || '—';
      const tEps  = fmtNum(p.trailing_eps);
      const tPE   = p.trailing_pe && p.trailing_pe > 0 ? fmtNum(p.trailing_pe) : '—';
      const fPE   = p.forward_pe  && p.forward_pe  > 0 ? fmtNum(p.forward_pe)  : '—';
      const mCap  = fmtMktCap(p.market_cap);
      return `<tr>
        <td class="td-ticker">${ticker}</td>
        <td class="td-name">${p.security_name}</td>
        <td class="td-value">${fmtDollar(p.value)}</td>
        <td class="td-muted">${sector}</td>
        <td class="td-num">${tEps}</td>
        <td class="td-num">${tPE}</td>
        <td class="td-num">${fPE}</td>
        <td class="td-num">${mCap}</td>
      </tr>`;
    }).join('');

    document.getElementById('earn-content').innerHTML = `
      <div class="hero">
        <div class="hero-label">Weighted Avg Trailing P/E</div>
        <div class="hero-value" style="color:var(--accent-blue)">${avgPE != null ? fmtNum(avgPE) : '—'}</div>
        <div class="hero-sub">Weighted by value · Stocks &amp; ETFs only · Excludes negative P/E</div>
      </div>
      <div class="card">
        <div class="card-title">Earnings Details</div>
        <table>
          <thead><tr>
            <th>Ticker</th>
            <th>Name</th>
            <th>Value</th>
            <th>Sector</th>
            <th>Trailing EPS</th>
            <th>Trailing P/E</th>
            <th>Forward P/E</th>
            <th>Market Cap</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
          <tfoot><tr style="border-top:1px solid var(--border)">
            <td colspan="7" style="padding:0.7rem 0;color:var(--text-muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em">Projected Annual Income</td>
            <td style="padding:0.7rem 0.75rem;text-align:right;color:var(--accent-teal);font-weight:700;font-variant-numeric:tabular-nums">${fmtDollar(totalIncome)}</td>
          </tr></tfoot>
        </table>
      </div>`;
  }

  // ── Tax renderer ──────────────────────────────────────────────
  function renderTax(data) {
    const buckets = data.buckets;
    const total = data.total_value;

    // Hero grid: show Taxable, Tax-Deferred, Tax-Advantaged (529) prominently
    const heroKeys = ['Taxable', 'Tax-Deferred', 'Tax-Advantaged (529)'];
    const heroCards = heroKeys.map(label => {
      const b = buckets[label];
      const val = b ? b.value : 0;
      const pct = b ? b.weight_pct : 0;
      return `<div class="card bucket-hero-card">
        <div class="bucket-label">${label}</div>
        <div class="bucket-value">${fmtDollar(val)}</div>
        <div class="bucket-pct">${fmtNum(pct)}% of portfolio</div>
      </div>`;
    }).join('');

    // Per-bucket detail cards
    const bucketCards = Object.entries(buckets).map(([label, b]) => {
      const accountRows = b.accounts.map(acct => {
        const barPct = total > 0 ? (acct.value / total * 100) : 0;
        return `<div class="tax-account-row">
          <div class="tax-account-header">
            <div>
              <span class="tax-account-name">${acct.account_name}</span>
              <span class="tax-account-inst"> · ${acct.institution_name}</span>
            </div>
            <div class="tax-account-val">${fmtDollar(acct.value)}</div>
          </div>
          <div class="tax-bar-wrap">
            <div class="tax-bar" style="width:${Math.min(barPct, 100)}%"></div>
          </div>
        </div>`;
      }).join('');

      return `<div class="card tax-bucket-card">
        <div class="card-title">${label} &nbsp;·&nbsp; ${fmtDollar(b.value)} (${fmtNum(b.weight_pct)}%)</div>
        ${accountRows}
      </div>`;
    }).join('');

    document.getElementById('tax-content').innerHTML = `
      <div class="grid-3">${heroCards}</div>
      <p class="tax-note">No cost basis — showing current market value only</p>
      ${bucketCards}`;
  }

  // ── Refresh ───────────────────────────────────────────────────
  async function refreshData() {
    const btn = document.getElementById('refresh-btn');
    btn.textContent = 'Refreshing…';
    btn.disabled = true;
    _marketData = null;
    _taxData = null;
    try {
      const data = await fetch('/api/refresh').then(r => r.json());
      _summaryData = data;
      renderDashboard(data);
      // Re-render current tab if it's not portfolio
      if (_activeTab === 'dividends' || _activeTab === 'earnings') {
        loadMarket(_activeTab);
      } else if (_activeTab === 'tax') {
        loadTax();
      }
    } finally {
      btn.textContent = 'Refresh Data';
      btn.disabled = false;
    }
  }

  // ── Init ──────────────────────────────────────────────────────
  fetch('/api/summary')
    .then(r => r.json())
    .then(data => {
      _summaryData = data;
      renderDashboard(data);
      document.getElementById('loading').classList.add('hidden');
    })
    .catch(err => {
      document.getElementById('loading').textContent = 'Failed to load: ' + err.message;
    });
</script>
</body>
</html>
