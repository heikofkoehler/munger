<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Munger — Portfolio</title>
  <style>
    /* ── Variables ──────────────────────────────────────────── */
    :root {
      --bg-page:     #0f1117;
      --bg-card:     #1a1d27;
      --bg-card-2:   #22263a;
      --border:      #2e3347;
      --text-primary:   #f0f2f5;
      --text-secondary: #8891a8;
      --text-muted:     #4d5568;
      --accent-purple:  #6c63ff;
      --accent-teal:    #00d4aa;
      --accent-blue:    #3b82f6;
      --accent-amber:   #f5a623;
      --accent-red:     #e05c5c;
      --color-stock:    #6c63ff;
      --color-etf:      #00d4aa;
      --color-fi:       #3b82f6;
      --color-cash:     #8891a8;
      --color-mf:       #f5a623;
    }

    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-primary);
    }
    .brand span { color: var(--accent-purple); }
    #refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #refresh-btn:hover { border-color: var(--accent-purple); color: var(--text-primary); }
    #refresh-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .layout {
      display: flex;
      min-height: calc(100vh - 56px);
    }
    .sidebar {
      width: 168px;
      flex-shrink: 0;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
      padding: 1.25rem 0;
    }
    .tab-btn {
      display: flex;
      align-items: center;
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      border-left: 3px solid transparent;
      color: var(--text-secondary);
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); }
    .tab-btn.active {
      color: var(--accent-purple);
      border-left-color: var(--accent-purple);
      background: rgba(108,99,255,0.08);
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .content { flex: 1; min-width: 0; }
    .page { padding: 2rem 2.5rem 4rem; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
    }

    /* ── Hero ───────────────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 3rem 1rem 2.5rem;
    }
    .hero-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    .hero-value {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1;
    }
    .hero-date {
      margin-top: 0.75rem;
      font-size: 13px;
      color: var(--text-muted);
    }
    .hero-sub {
      margin-top: 0.5rem;
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* ── 2-column grid ──────────────────────────────────────── */
    .grid-2 {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .grid-2 .card { margin-bottom: 0; }

    /* ── 3-column grid ──────────────────────────────────────── */
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .grid-3 .card { margin-bottom: 0; }

    /* ── 4-column grid ──────────────────────────────────────── */
    .grid-4 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .grid-4 .card { margin-bottom: 0; }

    /* ── Concentration flags ────────────────────────────────── */
    .flags-empty {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 0.5rem;
    }
    .flag-card {
      background: var(--bg-card-2);
      border: 1px solid var(--accent-red);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
    }
    .flag-ticker {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-red);
      margin-bottom: 0.25rem;
    }
    .flag-weight {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .flag-of { font-size: 13px; color: var(--text-secondary); margin-left: 4px; }
    .flag-threshold {
      margin-top: 0.4rem;
      font-size: 12px;
      color: var(--text-muted);
    }
    .flag-over { color: var(--accent-amber); font-weight: 600; }
    .no-flags {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent-teal);
      font-size: 13px;
      margin-top: 0.25rem;
    }

    /* ── Allocation bars ─────────────────────────────────────── */
    .alloc-row {
      display: grid;
      grid-template-columns: 120px 1fr 90px 52px;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }
    .alloc-row:last-child { border-bottom: none; }
    .alloc-name {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 13px;
      color: var(--text-primary);
    }
    .alloc-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Institutions ───────────────────────────────────────── */
    .inst-row {
      display: grid;
      grid-template-columns: 180px 1fr 110px 52px;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }
    .inst-row:last-child { border-bottom: none; }
    .inst-name { font-size: 13px; color: var(--text-primary); }
    .inst-bar-wrap {
      background: var(--bg-card-2);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .inst-bar {
      height: 100%;
      border-radius: 4px;
      background: var(--accent-purple);
      transition: width 0.4s ease;
    }
    .inst-value {
      font-size: 13px;
      color: var(--text-primary);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .inst-pct {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: right;
    }

    /* ── Tables ─────────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 0.75rem 0.75rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    thead th:not(:first-child) { text-align: right; }
    thead th:first-child { padding-left: 0; }
    thead th:hover { color: var(--text-secondary); }
    thead th[data-sort="asc"]::after  { content: " ▲"; color: var(--accent-purple); }
    thead th[data-sort="desc"]::after { content: " ▼"; color: var(--accent-purple); }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-card-2); }
    tbody td {
      padding: 0.7rem 0.75rem;
      color: var(--text-primary);
      vertical-align: middle;
    }
    tbody td:not(:first-child) { text-align: right; }
    tbody td:first-child { padding-left: 0; }
    .td-ticker {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
    }
    .ticker-link {
      color: inherit;
      text-decoration: none;
    }
    .ticker-link:hover { color: var(--accent-purple); }
    .td-name { color: var(--text-secondary); }
    .td-value { font-variant-numeric: tabular-nums; }
    .td-weight { color: var(--text-secondary); }
    .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .flag-icon {
      display: inline-block;
      color: var(--accent-amber);
      font-size: 12px;
      margin-left: 4px;
    }
    .td-muted { color: var(--text-muted); }
    .td-num { font-variant-numeric: tabular-nums; }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      gap: 1rem;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tax bucket cards ────────────────────────────────────── */
    .bucket-hero-card {
      text-align: center;
      padding: 1.5rem 1rem;
    }
    .bucket-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.4rem;
    }
    .bucket-value {
      font-size: 30px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.1;
    }
    .bucket-pct {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }
    .bucket-gain {
      font-size: 14px;
      font-weight: 600;
      margin-top: 0.35rem;
    }

    .tax-bucket-card { margin-bottom: 1.5rem; }
    .tax-account-row {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .tax-account-row:last-child { border-bottom: none; }
    .tax-account-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.4rem;
    }
    .tax-account-name { font-size: 13px; color: var(--text-primary); font-weight: 500; }
    .tax-account-inst { font-size: 12px; color: var(--text-muted); }
    .tax-account-val { font-size: 13px; color: var(--text-primary); font-variant-numeric: tabular-nums; }
    .tax-bar-wrap {
      background: var(--bg-card-2);
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
    }
    .tax-bar {
      height: 100%;
      border-radius: 4px;
      background: var(--accent-blue);
      transition: width 0.4s ease;
    }
    .tax-note {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    /* ── Account links & detail ──────────────────────────────── */
    .account-link {
      cursor: pointer;
      font-weight: 500;
      color: var(--text-primary);
    }
    .account-link:hover { color: var(--accent-purple); text-decoration: underline; }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      padding: 1.25rem 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .detail-header-info { flex: 1; }
    .detail-header-title { font-size: 18px; font-weight: 700; color: var(--text-primary); }
    .detail-header-sub { font-size: 13px; color: var(--text-muted); margin-top: 0.2rem; }
    .detail-header-value { font-size: 22px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; }
    .detail-back {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .detail-back:hover { border-color: var(--accent-purple); color: var(--text-primary); }

    /* ── Loading state ──────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg-page);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--text-secondary);
      z-index: 100;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>

<div id="loading">Loading portfolio…</div>

<header>
  <div class="brand"><span>M</span>UNGER</div>
  <button id="refresh-btn" onclick="refreshData()">Refresh Data</button>
</header>

<div class="layout">
<nav class="sidebar">
  <button class="tab-btn active" onclick="switchTab('portfolio')">Portfolio</button>
  <button class="tab-btn" onclick="switchTab('risk')">Risk</button>
  <button class="tab-btn" onclick="switchTab('efficiency')">Efficiency</button>
  <button class="tab-btn" onclick="switchTab('dividends')">Dividends</button>
  <button class="tab-btn" onclick="switchTab('earnings')">Earnings</button>
  <button class="tab-btn" onclick="switchTab('accounts')">Accounts</button>
</nav>

<div class="content">
<div class="page">

  <!-- ── Portfolio tab ── -->
  <div id="panel-portfolio" class="tab-panel active">
    <div class="hero">
      <div class="hero-label">Net Worth</div>
      <div id="total-value" class="hero-value">—</div>
      <div id="price-date" class="hero-date">—</div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">Allocation</div>
        <div id="alloc-panel"></div>
      </div>
      <div class="card">
        <div class="card-title">Concentration Risk</div>
        <div id="flags-panel"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">By Institution</div>
      <div id="institutions-panel"></div>
    </div>

    <div class="card">
      <div class="card-title">Positions</div>
      <table>
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Name</th>
            <th>Value</th>
            <th>Weight</th>
            <th>Type</th>
          </tr>
        </thead>
        <tbody id="positions-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ── Risk tab ── -->
  <div id="panel-risk" class="tab-panel">
    <div id="risk-content"></div>
  </div>

  <!-- ── Efficiency tab ── -->
  <div id="panel-efficiency" class="tab-panel">
    <div id="eff-content"></div>
  </div>

  <!-- ── Dividends tab ── -->
  <div id="panel-dividends" class="tab-panel">
    <div id="div-content"></div>
  </div>

  <!-- ── Earnings tab ── -->
  <div id="panel-earnings" class="tab-panel">
    <div id="earn-content"></div>
  </div>

  <!-- ── Accounts tab ── -->
  <div id="panel-accounts" class="tab-panel">
    <div id="accounts-content"></div>
  </div>

</div>
</div><!-- .content -->
</div><!-- .layout -->

<script>
  // ── Constants ─────────────────────────────────────────────────
  const ASSET_COLORS = {
    'Stock':        '#6c63ff',
    'ETF':          '#00d4aa',
    'Fixed Income': '#3b82f6',
    'Cash':         '#8891a8',
    'Mutual Fund':  '#f5a623',
  };

  function colorFor(type) {
    return ASSET_COLORS[type] || '#4d5568';
  }

  // ── Formatters ────────────────────────────────────────────────
  function fmtDollar(v) {
    if (v == null) return '—';
    if (v >= 1_000_000) return '$' + (v / 1_000_000).toFixed(2) + 'M';
    if (v >= 1_000)     return '$' + (v / 1_000).toFixed(1) + 'K';
    return '$' + v.toFixed(2);
  }
  function fmtDollarFull(v) {
    if (v == null) return '—';
    return '$' + v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }
  function fmtPct(v) {
    if (v == null) return '—';
    return v.toFixed(2) + '%';
  }
  function fmtMktCap(v) {
    if (!v) return '—';
    if (v >= 1e12) return '$' + (v / 1e12).toFixed(2) + 'T';
    if (v >= 1e9)  return '$' + (v / 1e9).toFixed(1) + 'B';
    if (v >= 1e6)  return '$' + (v / 1e6).toFixed(0) + 'M';
    return '$' + v.toLocaleString();
  }
  function fmtNum(v, decimals = 2) {
    if (v == null) return '—';
    return Number(v).toFixed(decimals);
  }

  // ── JS state ──────────────────────────────────────────────────
  let _summaryData = null;
  let _marketData = null;
  let _taxData = null;
  let _activeTab = 'portfolio';

  // ── Tab switching ─────────────────────────────────────────────
  function switchTab(name) {
    _activeTab = name;
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('onclick') === `switchTab('${name}')`);
    });
    document.querySelectorAll('.tab-panel').forEach(panel => {
      panel.classList.toggle('active', panel.id === `panel-${name}`);
    });

    if (name === 'risk') {
      loadRisk();
    } else if (name === 'efficiency') {
      loadEfficiency();
    } else if (name === 'dividends') {
      loadDividends();
    } else if (name === 'earnings') {
      loadEarnings();
    } else if (name === 'accounts') {
      loadAccounts();
    }
  }

  function spinner(msg = 'Fetching market data… (~16s first visit)') {
    return `<div class="spinner-wrap"><div class="spinner"></div><div>${msg}</div></div>`;
  }

  // ── Risk lazy load ────────────────────────────────────────────
  async function loadRisk() {
    if (_summaryData && _summaryData.risk) { renderRisk(_summaryData); return; }
    document.getElementById('risk-content').innerHTML = spinner('Analyzing fund holdings and concentration… (~12s)');
    try {
      const risk = await fetch('/api/risk').then(r => r.json());
      _summaryData.risk = risk;
      _summaryData.concentration = risk.true_exposure.filter(f => f.flagged);
      renderRisk(_summaryData);
      renderFlags(_summaryData); // Update flags on main portfolio tab too
    } catch (err) {
      document.getElementById('risk-content').innerHTML =
        `<div class="spinner-wrap" style="color:var(--accent-red)">Failed to load risk data: ${err.message}</div>`;
    }
  }

  // ── Efficiency lazy load ──────────────────────────────────────
  async function loadEfficiency() {
    document.getElementById('eff-content').innerHTML = spinner('Calculating long-term wealth impact…');
    try {
      const eff = await fetch('/api/efficiency').then(r => r.json());
      renderEfficiency(eff);
    } catch (err) {
      document.getElementById('eff-content').innerHTML =
        `<div class="spinner-wrap" style="color:var(--accent-red)">Failed to load efficiency data: ${err.message}</div>`;
    }
  }

  // ── Dividends lazy load (needs market + tax) ─────────────────
  async function loadDividends() {
    if (_marketData && _taxData) { renderDividends(_marketData, _taxData); return; }
    document.getElementById('div-content').innerHTML = spinner();
    try {
      const [market, tax] = await Promise.all([
        _marketData || fetch('/api/market').then(r => r.json()),
        _taxData    || fetch('/api/tax').then(r => r.json()),
      ]);
      _marketData = market;
      _taxData = tax;
      renderDividends(_marketData, _taxData);
    } catch (err) {
      document.getElementById('div-content').innerHTML =
        `<div class="spinner-wrap" style="color:var(--accent-red)">Failed to load: ${err.message}</div>`;
    }
  }

  // ── Earnings lazy load (needs market + tax) ───────────────────
  async function loadEarnings() {
    if (_marketData && _taxData) { renderEarnings(_marketData, _taxData); return; }
    document.getElementById('earn-content').innerHTML = spinner();
    try {
      const [market, tax] = await Promise.all([
        _marketData || fetch('/api/market').then(r => r.json()),
        _taxData    || fetch('/api/tax').then(r => r.json()),
      ]);
      _marketData = market;
      _taxData = tax;
      renderEarnings(_marketData, _taxData);
    } catch (err) {
      document.getElementById('earn-content').innerHTML =
        `<div class="spinner-wrap" style="color:var(--accent-red)">Failed to load: ${err.message}</div>`;
    }
  }

  // ── Accounts data lazy load ───────────────────────────────────
  async function loadAccounts() {
    if (_taxData) { renderAccounts(_taxData); return; }
    document.getElementById('accounts-content').innerHTML = spinner('Loading accounts…');
    try {
      _taxData = await fetch('/api/tax').then(r => r.json());
      renderAccounts(_taxData);
    } catch (err) {
      document.getElementById('accounts-content').innerHTML =

  // ── Ticker link ───────────────────────────────────────────────
  const SKIP_LINK = new Set(['FCASH', 'CUR:USD']);

  function tickerLink(ticker) {
    if (!ticker || SKIP_LINK.has(ticker)) return ticker || '—';
    const url = `https://finance.yahoo.com/quote/${encodeURIComponent(ticker)}`;

  // ── Sort helper ───────────────────────────────────────────────
  function parseVal(text) {
    const t = (text || '').trim();
    if (t === '—' || t === '') return NaN;
    const s = t.replace(/[$,]/g, '');
    if (s.endsWith('T')) return parseFloat(s) * 1e12;
    if (s.endsWith('B')) return parseFloat(s) * 1e9;
    if (s.endsWith('M')) return parseFloat(s) * 1e6;
    if (s.endsWith('K')) return parseFloat(s) * 1e3;
    if (s.endsWith('%')) return parseFloat(s);
    return parseFloat(s);
  }

  function makeSortable(table) {
    const ths = table.querySelectorAll('thead th');
    let sortCol = -1, sortAsc = true;
    ths.forEach((th, i) => {
      th.addEventListener('click', () => {
        sortAsc = (sortCol === i) ? !sortAsc : true;
        sortCol = i;
        ths.forEach((h, j) => {
          delete h.dataset.sort;
          if (j === i) h.dataset.sort = sortAsc ? 'asc' : 'desc';
        });
        const tbody = table.querySelector('tbody');
        Array.from(tbody.querySelectorAll('tr'))
          .sort((a, b) => {
            const aText = a.cells[i]?.textContent.trim() || '';
            const bText = b.cells[i]?.textContent.trim() || '';
            const aN = parseVal(aText), bN = parseVal(bText);
            let cmp;
            if (isNaN(aN) && isNaN(bN)) cmp = aText.localeCompare(bText);
            else if (isNaN(aN)) return 1;
            else if (isNaN(bN)) return -1;
            else cmp = aN - bN;
            return sortAsc ? cmp : -cmp;
          })
          .forEach(r => tbody.appendChild(r));
      });
    });
  }

  // ── Dividends renderer ────────────────────────────────────────
  function _divIncome(p) {
    if (p.dividend_rate && p.quantity) return p.quantity * p.dividend_rate;
    if (p.dividend_yield && p.value)   return p.value * p.dividend_yield / 100;
    return null;
  }

  function renderDividends(marketPositions, taxData) {
    // ticker → market data map
    const mktMap = {};
    for (const p of marketPositions) { if (p.ticker) mktMap[p.ticker] = p; }

    // Overall totals
    let totalIncome = 0, totalValue = 0;
    for (const p of marketPositions) {
      totalValue += p.value || 0;
      totalIncome += _divIncome(p) || 0;
    }
    const yieldOnValue = totalValue > 0 ? (totalIncome / totalValue * 100) : 0;

    // One card per tax bucket
    const sections = Object.entries(taxData.buckets).map(([label, bucket]) => {
      // Aggregate holdings by ticker across accounts in this bucket
      const agg = {};
      for (const acct of bucket.accounts) {
        for (const h of acct.holdings) {
          const key = h.ticker || h.security_name;
          if (!agg[key]) agg[key] = { ticker: h.ticker, security_name: h.security_name, value: 0 };
          agg[key].value += h.value;
        }
      }
      const positions = Object.values(agg)
        .map(h => ({ ...(h.ticker ? (mktMap[h.ticker] || {}) : {}), ...h }))
        // Use value × yield (not quantity × rate) — quantity is the global total, value is bucket-specific
        .map(p => ({ ...p, _income: (p.dividend_yield && p.value) ? p.value * p.dividend_yield / 100 : null }))
        .sort((a, b) => (b._income || 0) - (a._income || 0));

      const bucketIncome = positions.reduce((s, p) => s + (p._income || 0), 0);
      const incomeTag = `<span style="color:var(--accent-teal);font-weight:600;font-size:12px">${fmtDollar(bucketIncome)}/yr</span>`;

      const rows = positions.map(p => {
        const ticker = tickerLink(p.ticker || (p.security_name || '').slice(0, 15));
        const annualRate = p.dividend_rate != null ? '$' + fmtNum(p.dividend_rate) : '—';
        const yld = p.dividend_yield != null ? fmtNum(p.dividend_yield) + '%' : '—';
        const inc = p._income != null ? fmtDollar(p._income) : '—';
        const type = p.type_display || '—';
        const color = colorFor(type);
        return `<tr>
          <td class="td-ticker">${ticker}</td>
          <td class="td-name">${p.security_name || '—'}</td>
          <td class="td-value">${fmtDollar(p.value)}</td>
          <td><span class="type-badge" style="background:${color}22;color:${color}">${type}</span></td>
          <td class="td-num">${annualRate}</td>
          <td class="td-num">${yld}</td>
          <td class="td-num" style="color:var(--accent-teal)">${inc}</td>
        </tr>`;
      }).join('');

      return `<div class="card">
        <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
          <span>${label} &nbsp;·&nbsp; ${fmtDollar(bucket.value)} (${fmtNum(bucket.weight_pct)}%)</span>
          ${incomeTag}
        </div>
        <table>
          <thead><tr>
            <th>Ticker</th><th>Name</th><th>Value</th><th>Type</th>
            <th>Annual $/Share</th><th>Yield</th><th>Projected Income</th>
          </tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr style="border-top:1px solid var(--border)">
            <td colspan="6" style="padding:0.7rem 0;color:var(--text-muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em">Total</td>
            <td style="padding:0.7rem 0.75rem;text-align:right;color:var(--accent-teal);font-weight:700;font-variant-numeric:tabular-nums">${fmtDollar(bucketIncome)}</td>

    }).join('');

    document.getElementById('div-content').innerHTML = `
      <div class="hero">
        <div class="hero-label">Projected Annual Income</div>
        <div class="hero-value" style="color:var(--accent-teal)">${fmtDollar(totalIncome)}</div>
        <div class="hero-sub">Yield on value: ${fmtNum(yieldOnValue)}% &nbsp;·&nbsp; Total holdings: ${fmtDollarFull(totalValue)}</div>
      </div>
      ${sections}`;
    document.querySelectorAll('#div-content table').forEach(makeSortable);
  }

  // ── Earnings renderer ─────────────────────────────────────────
  function renderEarnings(marketPositions, taxData) {
    // ticker → market data map
    const mktMap = {};
    for (const p of marketPositions) { if (p.ticker) mktMap[p.ticker] = p; }

    // Overall weighted P/E
    let wPE = 0, wTot = 0;
    for (const p of marketPositions) {
      if ((p.type_display === 'Stock' || p.type_display === 'ETF')
          && p.trailing_pe && p.trailing_pe > 0) {
        wPE += p.trailing_pe * p.value; wTot += p.value;
      }
    }
    const avgPE = wTot > 0 ? wPE / wTot : null;

    // Overall projected income
    let totalIncome = 0;
    for (const p of marketPositions) {
      if (p.dividend_rate && p.quantity) totalIncome += p.quantity * p.dividend_rate;
      else if (p.dividend_yield && p.value) totalIncome += p.value * p.dividend_yield / 100;
    }

    // One card per tax bucket
    const sections = Object.entries(taxData.buckets).map(([label, bucket]) => {
      // Aggregate holdings by ticker across all accounts in this bucket
      const agg = {};
      for (const acct of bucket.accounts) {
        for (const h of acct.holdings) {
          const key = h.ticker || h.security_name;
          if (!agg[key]) agg[key] = { ticker: h.ticker, security_name: h.security_name, value: 0 };
          agg[key].value += h.value;
        }
      }
      const positions = Object.values(agg)
        .map(h => ({ ...(h.ticker ? (mktMap[h.ticker] || {}) : {}), ...h }))
        .sort((a, b) => b.value - a.value);

      // Bucket weighted P/E
      let bPE = 0, bTot = 0;
      for (const p of positions) {
        if ((p.type_display === 'Stock' || p.type_display === 'ETF')
            && p.trailing_pe && p.trailing_pe > 0) {
          bPE += p.trailing_pe * p.value; bTot += p.value;
        }
      }
      const bucketPE = bTot > 0 ? bPE / bTot : null;
      const peTag = bucketPE != null
        ? `<span style="color:var(--accent-blue);font-weight:600;font-size:12px">P/E ${fmtNum(bucketPE)}</span>`
        : '';

      const rows = positions.map(p => {
        const ticker = tickerLink(p.ticker || (p.security_name || '').slice(0, 15));
        const type = p.type_display || 'Cash';
        const color = colorFor(type);
        const typeBadge = `<span class="type-badge" style="background:${color}22;color:${color}">${type}</span>`;

          return `<tr>

            <td class="td-value">${fmtDollar(p.value)}</td>

            <td class="td-muted">—</td><td class="td-muted">—</td>
            <td class="td-muted">—</td>
          </tr>`;
        }
        return `<tr>
          <td class="td-ticker">${ticker}</td>
          <td class="td-name">${p.security_name || '—'}</td>
          <td class="td-value">${fmtDollar(p.value)}</td>
          <td>${typeBadge}</td>
          <td class="td-muted">${p.sector || '—'}</td>
          <td class="td-num">${fmtNum(p.trailing_eps)}</td>
          <td class="td-num">${p.trailing_pe > 0 ? fmtNum(p.trailing_pe) : '—'}</td>
          <td class="td-num">${p.forward_pe > 0 ? fmtNum(p.forward_pe) : '—'}</td>
          <td class="td-num">${fmtMktCap(p.market_cap)}</td>
        </tr>`;
      }).join('');

      return `<div class="card">
        <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
          <span>${label} &nbsp;·&nbsp; ${fmtDollar(bucket.value)} (${fmtNum(bucket.weight_pct)}%)</span>
          ${peTag}
        </div>
        <table>
          <thead><tr>
            <th>Ticker</th><th>Name</th><th>Value</th><th>Type</th><th>Sector</th>
            <th>Trailing EPS</th><th>Trailing P/E</th><th>Forward P/E</th><th>Market Cap</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }).join('');

    document.getElementById('earn-content').innerHTML = `
      <div class="hero">
        <div class="hero-label">Weighted Avg Trailing P/E</div>
        <div class="hero-value" style="color:var(--accent-blue)">${avgPE != null ? fmtNum(avgPE) : '—'}</div>
        <div class="hero-sub">Weighted by value · Stocks &amp; ETFs only · Excludes negative P/E &nbsp;·&nbsp; Projected income: ${fmtDollar(totalIncome)}</div>
      </div>
      ${sections}`;
    document.querySelectorAll('#earn-content table').forEach(makeSortable);
  }

  // ── Accounts renderer ─────────────────────────────────────────
  function _bucketGainInfo(b) {
    // Only include holdings where cost_basis is known (not null).
    // Positions with null basis (e.g. equity awards) are excluded to avoid
    // counting their full value as gain.
    let gain = 0, basis = 0, hasBasis = false;
    for (const acct of b.accounts)
      for (const h of acct.holdings)
        if (h.cost_basis != null) {
          basis += h.cost_basis;
          gain += h.value - h.cost_basis;
          hasBasis = true;
        }
    return hasBasis ? { basis, gain } : null;
  }

  function _gainSpan(gain, style = '') {
    const c = gain >= 0 ? 'var(--accent-teal)' : 'var(--accent-red)';
    return `<span style="color:${c};${style}">${gain >= 0 ? '+' : ''}${fmtDollar(gain)}</span>`;
  }

  function renderAccounts(data) {
    const buckets = data.buckets;
    const total = data.total_value;

    // Hero grid — include unrealized gain per bucket
    const heroKeys = ['Taxable', 'Tax-Deferred', 'Tax-Exempt (Roth)'];
    const heroCards = heroKeys.map(label => {
      const b = buckets[label];
      const val = b ? b.value : 0;
      const pct = b ? b.weight_pct : 0;
      const bg = b ? _bucketGainInfo(b) : null;
      const gainHtml = bg
        ? `<div class="bucket-gain">${_gainSpan(bg.gain)}</div>`
        : '';
      return `<div class="card bucket-hero-card">
        <div class="bucket-label">${label}</div>
        <div class="bucket-value">${fmtDollar(val)}</div>
        <div class="bucket-pct">${fmtNum(pct)}% of portfolio</div>
        ${gainHtml}
      </div>`;
    }).join('');

    // Per-bucket account cards — account names are clickable links
    const bucketCards = Object.entries(buckets).map(([label, b]) => {
      const bg = _bucketGainInfo(b);
      const bucketGainHtml = bg
        ? `&nbsp;·&nbsp; ${_gainSpan(bg.gain, 'font-weight:600')}`
        : '';

      const accountRows = b.accounts.map(acct => {
        const barPct = total > 0 ? (acct.value / total * 100) : 0;
        const safeName = acct.account_name.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
        const acctHasBasis = acct.holdings.some(h => h.cost_basis != null);
        const acctGain = acct.holdings.reduce((s, h) => h.cost_basis != null ? s + (h.value - h.cost_basis) : s, 0);
        const acctGainHtml = acctHasBasis
          ? `<div style="font-size:11px;text-align:right;margin-top:2px">${_gainSpan(acctGain, 'font-size:11px')}</div>`
          : '';
        return `<div class="tax-account-row">
          <div class="tax-account-header">
            <div>
              <span class="account-link" data-account="${safeName}">${acct.account_name}</span>
              <span class="tax-account-inst"> · ${acct.institution_name}</span>
            </div>
            <div>
              <div class="tax-account-val">${fmtDollar(acct.value)}</div>
              ${acctGainHtml}
            </div>
          </div>
          <div class="tax-bar-wrap">
            <div class="tax-bar" style="width:${Math.min(barPct, 100)}%"></div>
          </div>
        </div>`;
      }).join('');

      return `<div class="card tax-bucket-card">
        <div class="card-title">${label} &nbsp;·&nbsp; ${fmtDollar(b.value)} (${fmtNum(b.weight_pct)}%)${bucketGainHtml}</div>
        ${accountRows}
      </div>`;
    }).join('');

    document.getElementById('accounts-content').innerHTML = `
      <div class="grid-3">${heroCards}</div>
      ${bucketCards}`;

    document.querySelectorAll('#accounts-content .account-link').forEach(el => {
      el.addEventListener('click', () => showAccountDetail(el.dataset.account));
    });
  }

  // ── Account detail view ───────────────────────────────────────
  function showAccountDetail(accountName) {
    let account = null, bucketLabel = '';
    for (const [label, bucket] of Object.entries(_taxData.buckets)) {
      const found = bucket.accounts.find(a => a.account_name === accountName);
      if (found) { account = found; bucketLabel = label; break; }
    }
    if (!account) return;

    const totalValue = account.holdings.reduce((s, h) => s + h.value, 0);
    const totalCostBasis = account.holdings.reduce((s, h) => s + (h.cost_basis || 0), 0);
    const totalGain = totalValue - totalCostBasis;
    const hasBasis = account.holdings.some(h => h.cost_basis > 0);

    const rows = account.holdings.map(h => {
      const ticker = tickerLink(h.ticker || (h.security_name || '').slice(0, 15));
      const type = h.type_display || '—';
      const color = colorFor(type);
      const qty = h.quantity > 0 ? fmtNum(h.quantity, h.quantity % 1 === 0 ? 0 : 4) : '—';
      const price = (h.quantity > 0 && h.value > 0) ? fmtDollarFull(h.value / h.quantity) : '—';
      const basis = h.cost_basis > 0 ? fmtDollar(h.cost_basis) : '—';
      const gain = h.cost_basis > 0 ? h.value - h.cost_basis : null;
      const gainColor = gain == null ? '' : gain >= 0 ? 'color:var(--accent-teal)' : 'color:var(--accent-red)';
      const gainCell = gain == null ? '—' : `<span style="${gainColor}">${gain >= 0 ? '+' : ''}${fmtDollar(gain)}</span>`;
      return `<tr>
        <td class="td-ticker">${ticker}</td>
        <td class="td-name">${h.security_name}</td>
        <td class="td-num">${qty}</td>
        <td class="td-num">${price}</td>
        <td class="td-value">${fmtDollar(h.value)}</td>
        <td class="td-num">${basis}</td>
        <td class="td-num">${gainCell}</td>
        <td><span class="type-badge" style="background:${color}22;color:${color}">${type}</span></td>
      </tr>`;
    }).join('');

    document.getElementById('accounts-content').innerHTML = `
      <div class="detail-header">
        <button class="detail-back" onclick="renderAccounts(_taxData)">← Back</button>
        <div class="detail-header-info">
          <div class="detail-header-title">${account.account_name}</div>
          <div class="detail-header-sub">${account.institution_name} &nbsp;·&nbsp; ${bucketLabel}</div>
        </div>
        <div class="detail-header-value">${fmtDollarFull(totalValue)}</div>
      </div>
      <div class="card">
        <table>
          <thead><tr>
            <th>Ticker</th><th>Name</th><th>Qty</th><th>Price/Share</th><th>Value</th><th>Cost Basis</th><th>Gain / Loss</th><th>Type</th>
          </tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr style="border-top:1px solid var(--border)">
            <td colspan="4" style="padding:0.7rem 0;color:var(--text-muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em">Total</td>
            <td style="padding:0.7rem 0.75rem;text-align:right;font-weight:700;font-variant-numeric:tabular-nums">${fmtDollarFull(totalValue)}</td>
            <td style="padding:0.7rem 0.75rem;text-align:right;font-weight:700;font-variant-numeric:tabular-nums">${hasBasis ? fmtDollarFull(totalCostBasis) : '—'}</td>
            <td style="padding:0.7rem 0.75rem;text-align:right;font-weight:700;font-variant-numeric:tabular-nums;${hasBasis ? (totalGain >= 0 ? 'color:var(--accent-teal)' : 'color:var(--accent-red)') : ''}">${hasBasis ? (totalGain >= 0 ? '+' : '') + fmtDollarFull(totalGain) : '—'}</td>
            <td></td>
          </tfoot>
        </table>
      </div>`;
    document.querySelectorAll('#accounts-content table').forEach(makeSortable);
  }

  // ── Refresh ───────────────────────────────────────────────────
  async function refreshData() {
    const btn = document.getElementById('refresh-btn');
    btn.textContent = 'Refreshing…';
    btn.disabled = true;
    _marketData = null;
    _taxData = null;
    try {
      const data = await fetch('/api/refresh').then(r => r.json());
      _summaryData = data;
      renderDashboard(data);
      // Re-render current tab if it's not portfolio
      if (_activeTab === 'dividends') {
        loadDividends();
      } else if (_activeTab === 'earnings') {
        loadEarnings();
      } else if (_activeTab === 'accounts') {
        loadAccounts();
      }
    } finally {
      btn.textContent = 'Refresh Data';
      btn.disabled = false;
    }
  }

  // ── Init ──────────────────────────────────────────────────────
  fetch('/api/summary')
    .then(r => r.json())
    .then(data => {
      _summaryData = data;
      renderDashboard(data);
      document.getElementById('loading').classList.add('hidden');
    })
    .catch(err => {
      document.getElementById('loading').textContent = 'Failed to load: ' + err.message;
    });
</script>
</body>
</html>
